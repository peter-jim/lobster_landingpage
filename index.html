<script>
    // ⚙️ 部署时修改为服务器实际地址，例如 'https://your-server.com'
    const API_BASE = '';

    // ---------- Coming Soon Toast ----------
    function showToast(message) {
        const existing = document.getElementById('comingSoonToast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.id = 'comingSoonToast';
        toast.textContent = message;
        toast.style.cssText = 'position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:200;background:#18181b;color:#fff;padding:12px 28px;border-radius:12px;font-weight:700;font-size:15px;box-shadow:0 4px 24px rgba(0,0,0,0.4);border:2px solid #3f3f46;transition:opacity 0.3s;opacity:0;';
        document.body.appendChild(toast);
        requestAnimationFrame(() => { toast.style.opacity = '1'; });
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
    }

    document.addEventListener('DOMContentLoaded', () => {
        // ---------- Mac chip selector ----------
        const macLink = document.getElementById('downloadMacBtn');
        const macChipBtns = document.querySelectorAll('.mac-chip-btn');
        macChipBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                macChipBtns.forEach(b => {
                    b.classList.remove('active', 'bg-white/20', 'text-white', 'border-white/30');
                    b.classList.add('bg-white/10', 'text-white/70', 'border-white/20');
                });
                btn.classList.add('active', 'bg-white/20', 'text-white', 'border-white/30');
                btn.classList.remove('bg-white/10', 'text-white/70', 'border-white/20');
                macLink.href = btn.dataset.href;
            });
        });
        // Auto-detect Apple Silicon
        if (navigator.userAgent.includes('Mac')) {
            // Default is already ARM, no change needed
        } else if (navigator.userAgent.includes('Win')) {
            // Auto-scroll Windows button into focus — optional UX enhancement
        }

        const modal = document.getElementById('waitlistModal');
        const openBtn = document.getElementById('openWaitlistBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const backdrop = document.getElementById('modalBackdrop');
        const form = document.getElementById('subscribeForm');
        const emailInput = document.getElementById('emailInput');
        const submitBtn = form.querySelector('button[type="submit"]');

        // Open modal
        openBtn.addEventListener('click', () => {
            modal.classList.remove('hidden');
            clearFeedback();
            setTimeout(() => { emailInput.focus(); }, 100);
        });

        // Close modal functions
        const closeModal = () => {
            modal.classList.add('hidden');
            clearFeedback();
        };

        closeBtn.addEventListener('click', closeModal);
        backdrop.addEventListener('click', closeModal);

        // Escape key to close
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                closeModal();
            }
        });

        // ---------- Feedback helpers ----------
        function showFeedback(message, isSuccess) {
            clearFeedback();
            const div = document.createElement('div');
            div.id = 'subscribeFeedback';
            div.className = `mt-4 px-4 py-3 rounded-xl text-sm font-semibold ${
                isSuccess
                    ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30'
                    : 'bg-red-500/20 text-red-300 border border-red-500/30'
            }`;
            div.textContent = message;
            form.appendChild(div);
        }

        function clearFeedback() {
            const el = document.getElementById('subscribeFeedback');
            if (el) el.remove();
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitBtn.innerHTML = loading
                ? '<span class="material-symbols-outlined animate-spin text-xl">progress_activity</span> 提交中...'
                : '立即订阅 <span class="material-symbols-outlined text-xl">send</span>';
        }

        // ---------- Form submission ----------
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            if (!email) return;

            setLoading(true);
            clearFeedback();

            try {
                const resp = await fetch(`${API_BASE}/api/subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await resp.json();

                if (data.success) {
                    showFeedback(data.message || '订阅成功！🦞', true);
                    emailInput.value = '';
                    // 2 秒后自动关闭弹窗
                    setTimeout(closeModal, 2000);
                } else {
                    showFeedback(data.message || '提交失败，请重试', false);
                }
            } catch (err) {
                console.error('提交失败:', err);
                showFeedback('网络错误，请检查网络后重试', false);
            } finally {
                setLoading(false);
            }
        });
    });
</script>
<script>
    // ---------- Epic Loading Overlay ----------
    (function() {
        const overlay = document.getElementById('loadingOverlay');
        const banner = document.getElementById('heroBanner');
        const canvas = document.getElementById('loadingParticles');
        const ctx = canvas.getContext('2d');
        const progressBar = document.getElementById('loaderProgressBar');
        const percentEl = document.getElementById('loaderPercent');
        const subtitleEl = document.getElementById('loaderSubtitle');
        const MAX_WAIT = 15000;

        // --- Particles ---
        let particles = [];
        let animId;
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const COLORS = ['#ff6b52', '#FFE600', '#00FF41', '#ff3d00', '#ffab40'];
        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: canvas.height + 10,
                size: Math.random() * 3 + 1,
                speedY: -(Math.random() * 1.5 + 0.5),
                speedX: (Math.random() - 0.5) * 0.8,
                opacity: Math.random() * 0.6 + 0.2,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                life: 0,
                maxLife: Math.random() * 200 + 100,
            };
        }
        for (let i = 0; i < 60; i++) {
            const p = createParticle();
            p.y = Math.random() * canvas.height;
            p.life = Math.random() * p.maxLife;
            particles.push(p);
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.speedX;
                p.y += p.speedY;
                p.life++;
                const fadeRatio = 1 - p.life / p.maxLife;
                const alpha = p.opacity * Math.max(0, fadeRatio);
                if (p.life >= p.maxLife || alpha <= 0) {
                    particles[i] = createParticle();
                    continue;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            animId = requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // --- Typewriter ---
        const messages = [
            '正在召唤小龙虾...',
            '准备桌面冒险地图...',
            '打磨像素世界...',
            '小龙虾正在热身...',
            '加载中，马上就好...',
        ];
        let msgIndex = 0, charIndex = 0, deleting = false;
        function typewrite() {
            const current = messages[msgIndex];
            if (!deleting) {
                subtitleEl.textContent = current.substring(0, charIndex + 1);
                charIndex++;
                if (charIndex >= current.length) {
                    setTimeout(() => { deleting = true; typewrite(); }, 1200);
                    return;
                }
                setTimeout(typewrite, 80);
            } else {
                subtitleEl.textContent = current.substring(0, charIndex);
                charIndex--;
                if (charIndex < 0) {
                    deleting = false;
                    charIndex = 0;
                    msgIndex = (msgIndex + 1) % messages.length;
                    setTimeout(typewrite, 300);
                    return;
                }
                setTimeout(typewrite, 40);
            }
        }
        typewrite();

        // --- Smooth progress bar ---
        let progress = 0;
        let targetProgress = 0;
        let imageLoaded = false;

        function updateProgress() {
            if (!imageLoaded) {
                // Simulate progress: fast at start, slow down approaching 90%
                if (targetProgress < 90) {
                    targetProgress += (90 - targetProgress) * 0.02;
                }
            } else {
                targetProgress = 100;
            }
            progress += (targetProgress - progress) * 0.15;
            const pct = Math.min(Math.round(progress), 100);
            progressBar.style.width = pct + '%';
            percentEl.textContent = pct + '%';

            if (pct >= 100) {
                setTimeout(hideOverlay, 300);
                return;
            }
            requestAnimationFrame(updateProgress);
        }
        requestAnimationFrame(updateProgress);

        // --- Hide overlay ---
        function hideOverlay() {
            if (overlay._hidden) return;
            overlay._hidden = true;
            banner.style.opacity = '1';
            overlay.classList.add('fade-out');
            cancelAnimationFrame(animId);
            setTimeout(() => overlay.remove(), 900);
        }

        if (banner.complete && banner.naturalWidth > 0) {
            imageLoaded = true;
        } else {
            banner.addEventListener('load', () => { imageLoaded = true; });
            banner.addEventListener('error', () => { imageLoaded = true; });
            setTimeout(() => { imageLoaded = true; }, MAX_WAIT);
        }
    })();
</script>
